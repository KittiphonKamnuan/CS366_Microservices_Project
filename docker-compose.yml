services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://volunteer_user:secret@postgres:5432/volunteer_db
      HOST: 0.0.0.0
      PORT: "8080"
      RUST_LOG: info
      # Leave SNS ARNs empty → mock/log mode (no AWS needed locally)
      SNS_LOCATION_TOPIC_ARN: ""
      SNS_MATCH_TOPIC_ARN: ""
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: volunteer_db
      POSTGRES_USER: volunteer_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volunteer_user -d volunteer_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
